<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow"><meta name="theme-color" content="#06152f">
  <title>Auryk Control</title><link rel="stylesheet" href="styles.css">
  <style>[hidden]{display:none!important}</style>
</head>
<body>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <section id="authView" class="auth-shell">
    <form id="loginForm" class="auth-card">
      <div class="brand-mark">A</div><p class="eyebrow">Administración segura</p><h1>Auryk Control</h1>
      <p>Gestiona contenido, proyectos y activos corporativos desde un solo lugar.</p>
      <label>Correo<input name="email" type="email" autocomplete="username" required></label>
      <label>Contraseña<input name="password" type="password" autocomplete="current-password" minlength="8" required></label>
      <button class="primary" type="submit">Iniciar sesión</button>
      <button class="link-btn" id="resetPassword" type="button">Recuperar contraseña</button>
      <small id="configNotice"></small>
    </form>
  </section>
  <div id="appView" class="app-shell" hidden>
    <aside class="sidebar">
      <div class="logo"><span>A</span><div><b>Auryk Control</b><small>Holding Group</small></div></div>
      <nav id="nav" aria-label="Panel administrativo">
        <button data-view="dashboard" class="active">Resumen</button><button data-view="home">Inicio</button>
        <button data-view="management">Gestión</button><button data-view="projects">Proyectos</button>
        <button data-view="services">Servicios</button><button data-view="clients">Clientes</button>
        <button data-view="media">Fotografías</button><button data-view="settings">Configuración</button>
      </nav>
      <button id="logout" class="logout">Cerrar sesión</button>
    </aside>
    <main>
      <header class="topbar"><button id="menu" aria-label="Abrir menú">☰</button><div><p id="viewEyebrow">Centro de control</p><h1 id="viewTitle">Resumen</h1></div><div class="connection"><i></i><span id="connectionText">En línea</span></div></header>
      <section id="dashboardView" class="view active"><div id="stats" class="stats"></div><div class="panel"><h2>Actividad reciente</h2><div id="activity" class="activity"></div></div></section>
      <section id="editorView" class="view"><div class="toolbar"><div><button id="newItem" class="primary">Crear nuevo</button><button id="refresh">Actualizar</button></div><div><input id="search" type="search" placeholder="Buscar"><select id="statusFilter"><option value="">Todos</option><option>borrador</option><option>publicado</option><option>archivado</option></select></div></div><div class="content-grid"><div id="records" class="records"></div><form id="recordForm" class="panel editor" hidden></form></div></section>
      <section id="mediaView" class="view"><div class="toolbar"><button id="uploadMedia" class="primary">Subir fotografías</button><input id="mediaInput" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden><input id="mediaSearch" type="search" placeholder="Buscar fotografías"></div><div id="dropzone" class="dropzone" tabindex="0"><b>Arrastra imágenes aquí</b><span>JPG, PNG o WebP. Se convertirán a WebP optimizado.</span></div><div id="mediaGrid" class="media-grid"></div></section>
    </main>
  </div>
  <dialog id="previewDialog"><button class="dialog-close" aria-label="Cerrar">×</button><iframe title="Vista previa del sitio"></iframe></dialog>
  <script src="../config.js"></script><script src="../lib/supabase-rest.js"></script><script src="app.js"></script>
</body></html>
